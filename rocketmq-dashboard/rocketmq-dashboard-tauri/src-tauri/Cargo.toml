[workspace]
# This is a standalone project, not part of the parent workspace

[package]
name         = "rocketmq-dashboard-tauri"
version      = "0.1.0"
description  = "RocketMQ-Rust Dashboard Desktop App (Tauri)"
authors      = ["mxsm <mxsm@apache.org>"]
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/mxsm/rocketmq-rust"
homepage     = "https://github.com/mxsm/rocketmq-rust"
edition      = "2024"
rust-version = "1.85.0"
resolver     = "3"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name       = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
serde_json       = "1.0"
json5            = "0.4"
serde            = { version = "1.0", features = ["derive"] }
log              = "0.4"
tauri            = { version = "2.10.0", features = [] }
tauri-plugin-log = "2"
rusqlite         = { version = "0.32", features = ["bundled"] }
argon2           = "0.5"
password-hash    = "0.5"
rand_core        = { version = "0.6", features = ["getrandom"] }
uuid             = { version = "1", features = ["v4", "serde"] }
chrono           = { version = "0.4", features = ["serde"] }
tokio            = { version = "1", features = ["sync"] }
rocketmq-dashboard-common = { path = "../../rocketmq-dashboard-common" }
anyhow           = "1.0"
cheetah-string   = "1"
rocketmq-common  = { path = "../../../rocketmq-common" }
rocketmq-admin-core = { path = "../../../rocketmq-tools/rocketmq-admin/rocketmq-admin-core" }
rocketmq-client-rust = { path = "../../../rocketmq-client" }
rocketmq-remoting = { path = "../../../rocketmq-remoting" }
rocketmq-error = { path = "../../../rocketmq-error" }
