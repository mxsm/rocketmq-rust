[package]
name = "rocketmq-admin-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords = [
  "apache-rocketmq",
  "rocketmq-rust",
  "apache",
  "rust",
  "rocketmq-tools",
]
categories = ["development-tools"]
readme = "README.md"
description = "Reusable RocketMQ admin capability layer"
rust-version.workspace = true

[features]
default        = ["legacy-common-compat"]
client-adapter = ["dep:rocketmq-client-rust"]
legacy-common-compat = [
  "client-adapter",
  "dep:rocketmq-common",
]
rocksdb-export = ["dep:rocksdb"]

[dependencies]
rocketmq-model        = { workspace = true }
rocketmq-protocol     = { workspace = true }
rocketmq-security-api = { workspace = true }

rocketmq-client-rust = { workspace = true, optional = true }
rocketmq-common      = { workspace = true, optional = true }

serde.workspace      = true
serde_json.workspace = true
tokio                = { workspace = true }
tracing              = { workspace = true }

cheetah-string = { workspace = true }
futures        = "0.3.32"
regex          = "1.12.4"
bytes          = { workspace = true }
rocksdb        = { workspace = true, optional = true }

[[example]]
name              = "admin_builder_pattern"
required-features = ["legacy-common-compat"]

[[test]]
name              = "auth_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "cluster_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "connection_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "container_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "controller_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "export_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "ha_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "lite_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "legacy_surface_compile"
required-features = ["legacy-common-compat"]

[[test]]
name              = "producer_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "static_topic_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "stats_core_models"
required-features = ["legacy-common-compat"]

[[test]]
name              = "topic_list_core_models"
required-features = ["legacy-common-compat"]
