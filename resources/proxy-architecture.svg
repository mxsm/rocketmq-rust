<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">rocketmq-proxy architecture</title>
  <desc id="desc">Architecture diagram for the RocketMQ Rust proxy crate, showing gRPC and remoting ingress, runtime assembly, messaging processor, service-manager backends, authentication, sessions, hooks, metrics, and external RocketMQ integrations.</desc>
  <defs>
    <linearGradient id="titleGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px "Segoe UI", Arial, sans-serif; fill: url(#titleGradient); }
      .subtitle { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 11.5px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .tiny { font: 500 10.5px "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.1; filter: url(#softShadow); }
      .subpanel { fill: #f8fafc; stroke: #dbe4ef; stroke-width: 1; }
      .chip-blue { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
      .chip-teal { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; }
      .chip-amber { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; }
      .chip-violet { fill: #f5f3ff; stroke: #ddd6fe; stroke-width: 1; }
      .chip-rose { fill: #fff1f2; stroke: #fecdd3; stroke-width: 1; }
      .chip-gray { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1; }
      .chip-green { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1; }
      .arrow { stroke: #475569; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; marker-end: url(#arrow); }
      .bus { stroke: #94a3b8; stroke-width: 1.1; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="780"/>
  <text x="54" y="58" class="title">rocketmq-proxy Architecture</text>
  <text x="54" y="84" class="subtitle">Rust-native RocketMQ proxy runtime for Apache RocketMQ v2 gRPC, optional remoting ingress, cluster mode, and embedded local mode.</text>

  <rect x="42" y="124" width="238" height="438" rx="14" class="panel"/>
  <text x="72" y="157" class="section-title">Client Protocols</text>
  <rect x="72" y="198" width="178" height="64" rx="9" class="chip-blue"/>
  <text x="96" y="223" class="label">gRPC v2 clients</text>
  <text x="96" y="241" class="small">MessagingService RPCs</text>
  <rect x="72" y="286" width="178" height="64" rx="9" class="chip-teal"/>
  <text x="96" y="311" class="label">Remoting clients</text>
  <text x="96" y="329" class="small">optional request-code ingress</text>
  <rect x="72" y="374" width="178" height="64" rx="9" class="chip-gray"/>
  <text x="96" y="399" class="label">Proxy config</text>
  <text x="96" y="417" class="small">cluster or local mode</text>
  <rect x="72" y="462" width="178" height="64" rx="9" class="chip-amber"/>
  <text x="96" y="487" class="label">Shutdown signal</text>
  <text x="96" y="505" class="small">shared server lifecycle</text>

  <rect x="342" y="124" width="270" height="170" rx="14" class="panel"/>
  <text x="372" y="157" class="section-title">Runtime Assembly</text>
  <rect x="372" y="194" width="210" height="50" rx="9" class="chip-violet"/>
  <text x="394" y="216" class="label">ProxyRuntimeBuilder</text>
  <text x="394" y="232" class="small">inject services, hooks, metrics</text>
  <rect x="372" y="258" width="210" height="50" rx="9" class="chip-violet"/>
  <text x="394" y="280" class="label">ProxyRuntime</text>
  <text x="394" y="296" class="small">owns server lifecycle</text>

  <rect x="342" y="330" width="270" height="232" rx="14" class="panel"/>
  <text x="372" y="363" class="section-title">Ingress Surface</text>
  <rect x="372" y="398" width="210" height="50" rx="9" class="chip-blue"/>
  <text x="394" y="420" class="label">ProxyGrpcService</text>
  <text x="394" y="436" class="small">tonic MessagingService server</text>
  <rect x="372" y="462" width="210" height="50" rx="9" class="chip-teal"/>
  <text x="394" y="484" class="label">ProxyRemotingDispatcher</text>
  <text x="394" y="500" class="small">selected RocketMQ request codes</text>
  <rect x="372" y="526" width="210" height="50" rx="9" class="chip-gray"/>
  <text x="394" y="548" class="label">ProxyContext</text>
  <text x="394" y="564" class="small">caller, endpoint, auth state</text>

  <rect x="672" y="124" width="270" height="438" rx="14" class="panel"/>
  <text x="702" y="157" class="section-title">Messaging Core</text>
  <rect x="702" y="198" width="210" height="64" rx="9" class="chip-rose"/>
  <text x="724" y="223" class="label">DefaultMessagingProcessor</text>
  <text x="724" y="241" class="small">validates and plans operations</text>
  <rect x="702" y="286" width="210" height="64" rx="9" class="chip-rose"/>
  <text x="724" y="311" class="label">Route / metadata</text>
  <text x="724" y="329" class="small">topics, groups, assignments</text>
  <rect x="702" y="374" width="210" height="64" rx="9" class="chip-rose"/>
  <text x="724" y="399" class="label">Message operations</text>
  <text x="724" y="417" class="small">send, receive, ack, offsets</text>
  <rect x="702" y="462" width="210" height="64" rx="9" class="chip-rose"/>
  <text x="724" y="487" class="label">Transactions</text>
  <text x="724" y="505" class="small">end, recall, DLQ plans</text>

  <rect x="1002" y="124" width="236" height="438" rx="14" class="panel"/>
  <text x="1032" y="157" class="section-title">Cross-Cutting Runtime</text>
  <rect x="1032" y="198" width="176" height="58" rx="9" class="chip-amber"/>
  <text x="1054" y="221" class="label">ProxyAuthRuntime</text>
  <text x="1054" y="238" class="small">gRPC metadata / remoting ACL</text>
  <rect x="1032" y="280" width="176" height="58" rx="9" class="chip-green"/>
  <text x="1054" y="303" class="label">ClientSessionRegistry</text>
  <text x="1054" y="320" class="small">heartbeats, telemetry, handles</text>
  <rect x="1032" y="362" width="176" height="58" rx="9" class="chip-violet"/>
  <text x="1054" y="385" class="label">ProxyHookChain</text>
  <text x="1054" y="402" class="small">request outcomes</text>
  <rect x="1032" y="444" width="176" height="58" rx="9" class="chip-blue"/>
  <text x="1054" y="467" class="label">ProxyMetrics</text>
  <text x="1054" y="484" class="small">snapshots and OTel feature</text>

  <rect x="342" y="608" width="896" height="118" rx="14" class="panel"/>
  <text x="372" y="641" class="section-title">ServiceManager Backends</text>
  <rect x="372" y="666" width="236" height="42" rx="9" class="chip-blue"/>
  <text x="394" y="684" class="label">ClusterServiceManager</text>
  <text x="394" y="700" class="tiny">RocketmqClusterClient + RPC hook</text>
  <rect x="636" y="666" width="236" height="42" rx="9" class="chip-teal"/>
  <text x="658" y="684" class="label">LocalServiceManager</text>
  <text x="658" y="700" class="tiny">embedded broker-backed services</text>
  <rect x="900" y="666" width="236" height="42" rx="9" class="chip-gray"/>
  <text x="922" y="684" class="label">LocalRemotingBackend</text>
  <text x="922" y="700" class="tiny">local-mode remoting passthrough</text>

  <rect x="106" y="628" width="176" height="64" rx="12" class="subpanel"/>
  <text x="132" y="654" class="label">External cluster</text>
  <text x="132" y="672" class="small">NameServer + brokers</text>

  <path d="M250 230 C286 230 306 216 372 216" class="arrow"/>
  <path d="M250 318 C286 318 306 424 372 424" class="arrow"/>
  <path d="M250 406 C294 406 314 280 372 280" class="arrow"/>
  <path d="M477 308 V398" class="arrow"/>
  <path d="M582 424 H702" class="arrow"/>
  <path d="M582 488 C638 488 646 230 702 230" class="arrow"/>
  <path d="M582 552 C638 552 646 406 702 406" class="arrow"/>
  <path d="M807 526 V666" class="arrow"/>
  <path d="M942 230 H1032" class="dash"/>
  <path d="M942 318 H1032" class="dash"/>
  <path d="M942 406 H1032" class="dash"/>
  <path d="M942 494 H1032" class="dash"/>
  <path d="M372 687 C334 687 316 672 282 660" class="dash"/>
  <path d="M608 687 H636" class="arrow"/>
  <path d="M872 687 H900" class="arrow"/>
  <path d="M177 526 C177 596 226 618 342 646" class="bus"/>
  <path d="M1136 502 C1188 548 1196 610 1136 666" class="bus"/>
</svg>
