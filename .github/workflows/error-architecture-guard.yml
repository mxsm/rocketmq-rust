name: Error Architecture Guard

on:
  pull_request:
    paths:
      - ".github/workflows/error-architecture-guard.yml"
      - "scripts/error_architecture_guard.py"
      - "rocketmq-error/**"
      - "rocketmq-common/**"
      - "rocketmq-remoting/**"
      - "rocketmq-proxy/**"
      - "rocketmq-broker/src/processor/**"
      - "rocketmq-broker/src/processor.rs"
      - "rocketmq-namesrv/src/processor/**"
      - "rocketmq-namesrv/src/processor.rs"
  push:
    branches:
      - main
      - "mxsm/**"
    paths:
      - ".github/workflows/error-architecture-guard.yml"
      - "scripts/error_architecture_guard.py"
      - "rocketmq-error/**"
      - "rocketmq-common/**"
      - "rocketmq-remoting/**"
      - "rocketmq-proxy/**"
      - "rocketmq-broker/src/processor/**"
      - "rocketmq-broker/src/processor.rs"
      - "rocketmq-namesrv/src/processor/**"
      - "rocketmq-namesrv/src/processor.rs"

concurrency:
  group: error-architecture-guard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Guard typed error architecture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run error architecture guard
        run: python3 scripts/error_architecture_guard.py
