name: Auto Approve Pull Requests

on:
  pull_request_target:
    types: [ opened, synchronize, reopened ]
  check_suite:
    types: [ completed ]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # Skip suites that already failed outright (saves an API round-trip)
    if: github.event_name == 'pull_request_target' || (github.event_name == 'check_suite' && github.event.check_suite.conclusion != 'failure' && github.event.check_suite.conclusion != 'cancelled')

    steps:
      - name: Verify required status checks and auto-approve PR
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

            let headSha;
            let pr = context.payload.pull_request;
            if (pr) {
              headSha = pr.head.sha;
            } else {
              headSha = context.payload.check_suite?.head_sha;
            }

            // check_suite.pull_requests is empty for fork PRs; fall back to a list search.
            if (!pr && context.payload.check_suite) {
              pr = context.payload.check_suite.pull_requests?.[0];
            }
            if (!pr && headSha) {
              const { data: openPRs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 100,
              });
              pr = openPRs.find(p => p.head.sha === headSha);
            }
            if (!pr) {
              console.log('No open PR associated with this check suite — skipping.');
              return;
            }
            headSha = pr.head.sha;
            console.log(`Processing PR #${pr.number}, HEAD SHA: ${headSha}`);

            // Fetch branch-protection required checks.
            const { data: branch } = await github.rest.repos.getBranch({
              owner, repo, branch: pr.base.ref,
            });
            const requiredChecks = branch.protection?.required_status_checks?.contexts ?? [];
            console.log('Required status checks:', requiredChecks);
            if (requiredChecks.length === 0) {
              console.log('No required status checks configured — skipping.');
              return;
            }

            // Fetch all check runs for the head commit.
            const { data: { check_runs } } = await github.rest.checks.listForRef({
              owner, repo, ref: headSha, per_page: 100,
            });
            console.log(`Found ${check_runs.length} check run(s).`);

            const requiredRuns = check_runs.filter(c => requiredChecks.includes(c.name));
            const failed  = requiredRuns.filter(c => c.status === 'completed' && c.conclusion !== 'success' && c.conclusion !== 'skipped');
            const pending = requiredRuns.filter(c => c.status !== 'completed');

            if (failed.length > 0) {
              console.log(`Required checks failed: ${failed.map(c => c.name).join(', ')} — not approving.`);
              return;
            }
            if (pending.length > 0) {
              console.log(`Required checks still pending: ${pending.map(c => c.name).join(', ')} — waiting for next event.`);
              return;
            }
            if (requiredRuns.length === 0) {
              console.log('None of the required checks were found on this commit — skipping.');
              return;
            }

            // Avoid duplicate approvals for the same commit.
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner, repo, pull_number: pr.number,
            });
            const alreadyApproved = reviews.some(r => r.state === 'APPROVED' && r.commit_id === headSha);
            if (alreadyApproved) {
              console.log('PR already approved for this commit — skipping.');
              return;
            }

            console.log('All required checks passed — approving PR.');
            await github.rest.pulls.createReview({
              owner, repo,
              pull_number: pr.number,
              event: 'APPROVE',
              body: 'LGTM - All CI checks passed ✅',
            });
