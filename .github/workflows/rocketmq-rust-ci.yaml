name: RocketMQ Rust CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'rocketmq-doc/**'
      - 'rocketmq-website/**'
      - 'docker/**'
      - 'resources/**'
      - 'distribution/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-gpui/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-tauri/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-web/**'
      - 'rocketmq-dashboard/README*.md'
      - 'rocketmq-example/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'rocketmq-doc/**'
      - 'rocketmq-website/**'
      - 'docker/**'
      - 'resources/**'
      - 'distribution/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-gpui/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-tauri/**'
      - 'rocketmq-dashboard/rocketmq-dashboard-web/**'
      - 'rocketmq-dashboard/README*.md'
      - 'rocketmq-example/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  CI: true
  CARGO_PROFILE_DEV_DEBUG: "false"
  CARGO_PROFILE_TEST_DEBUG: "false"
  CARGO_PROFILE_DEV_OPT_LEVEL: 1
  CARGO_PROFILE_DEV_OVERFLOW_CHECKS: "false"
  # ===== RocksDB / build cache =====
  CARGO_TARGET_DIR: target
  ROCKSDB_DISABLE_JEMALLOC: 1

jobs:
  # =========================
  # Format + Clippy + Shear
  # =========================
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libclang-dev \
            cmake make ninja-build pkg-config \
            protobuf-compiler \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

          # Use llvm-config to find libclang path
          if command -v llvm-config >/dev/null 2>&1; then
            LIBCLANG_PATH=$(llvm-config --libdir)
            echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
            echo "Found libclang using llvm-config at: $LIBCLANG_PATH"
          else
            # Fallback: Search for llvm-config with version suffix
            LLVM_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -n 1)
            if [ -n "$LLVM_CONFIG" ]; then
              LIBCLANG_PATH=$($LLVM_CONFIG --libdir)
              echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
              echo "Found libclang using $LLVM_CONFIG at: $LIBCLANG_PATH"
            else
              # Last resort: search manually
              for path in /usr/lib/llvm-*/lib /usr/lib/x86_64-linux-gnu /usr/lib64 /usr/lib; do
                if [ -f "$path/libclang.so" ] || ls "$path"/libclang.so.* >/dev/null 2>&1; then
                  echo "LIBCLANG_PATH=$path" >> $GITHUB_ENV
                  echo "Found libclang at: $path (manual search)"
                  break
                fi
              done
            fi
          fi

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache Rust + RocksDB
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rocketmq-rust-ubuntu
          workspaces: |
            .
          env-vars: |
            CC
            CXX
            LIBCLANG_PATH
            LLVM_PREFIX
            DYLD_FALLBACK_LIBRARY_PATH
            ROCKSDB_DISABLE_JEMALLOC

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --no-deps --all-targets --all-features -- -D warnings

  # =========================
  # Observability feature matrix
  # =========================
  observability-feature-matrix:
    name: Observability Features (${{ matrix.features || 'default' }})
    needs: check
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "observability"
          - "otlp-metrics"
          - "otel-metrics,prometheus"
          - "otlp-traces"
          - "otlp-logs"
          - "otlp-metrics,otlp-traces,otlp-logs,prometheus"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libclang-dev \
            cmake make ninja-build pkg-config \
            protobuf-compiler \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache Rust + RocksDB
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: observability-features-${{ matrix.features || 'default' }}
          workspaces: |
            .
          env-vars: |
            CC
            CXX
            LIBCLANG_PATH
            ROCKSDB_DISABLE_JEMALLOC

      - name: Check observability feature set
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo check --workspace --all-targets --features "$FEATURES"
          else
            cargo check --workspace --all-targets
          fi

      - name: Clippy observability feature set
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo clippy --workspace --no-deps --all-targets --features "$FEATURES" -- -D warnings
          else
            cargo clippy --workspace --no-deps --all-targets -- -D warnings
          fi

      - name: Test rocketmq-observability feature set
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo test -p rocketmq-observability --features "$FEATURES"
          else
            cargo test -p rocketmq-observability
          fi

  # =========================
  # RocksDB feature validation
  # =========================
  rocksdb-store:
    name: RocksDB Store Feature (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libclang-dev \
            cmake make ninja-build pkg-config \
            protobuf-compiler \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$(llvm-config --libdir)" >> $GITHUB_ENV

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake ninja protoc llvm -y
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=C:\Program Files\LLVM\bin"

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache Rust + RocksDB
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rocksdb-store-${{ matrix.os }}
          workspaces: |
            .
          env-vars: |
            CC
            CXX
            LIBCLANG_PATH
            ROCKSDB_DISABLE_JEMALLOC

      - name: Clippy rocksdb store
        run: cargo clippy -p rocketmq-store --features rocksdb_store --all-targets -- -D warnings

      - name: Clippy rocksdb broker
        run: cargo clippy -p rocketmq-broker --features rocksdb_store --all-targets -- -D warnings

      - name: Test rocksdb store foundation
        run: cargo test -p rocketmq-store --features rocksdb_store --test rocksdb_foundation_tests

      - name: Test rocksdb store semantics
        run: cargo test -p rocketmq-store --features rocksdb_store --test rocksdb_store_semantics_tests

      - name: Test rocksdb broker metadata and Pop
        run: |
          cargo test -p rocketmq-broker --features rocksdb_store rocksdb
          cargo test -p rocketmq-broker --features rocksdb_store pop_consumer

  # =========================
  # Build + Test
  # =========================
  build-test:
    name: Build & Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # ---------- Ubuntu ----------
      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libclang-dev \
            cmake make ninja-build pkg-config \
            protobuf-compiler \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

          # Use llvm-config to find libclang path
          if command -v llvm-config >/dev/null 2>&1; then
            LIBCLANG_PATH=$(llvm-config --libdir)
            echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
            echo "Found libclang using llvm-config at: $LIBCLANG_PATH"
          else
            # Fallback: Search for llvm-config with version suffix
            LLVM_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -n 1)
            if [ -n "$LLVM_CONFIG" ]; then
              LIBCLANG_PATH=$($LLVM_CONFIG --libdir)
              echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
              echo "Found libclang using $LLVM_CONFIG at: $LIBCLANG_PATH"
            else
              # Last resort: search manually
              for path in /usr/lib/llvm-*/lib /usr/lib/x86_64-linux-gnu /usr/lib64 /usr/lib; do
                if [ -f "$path/libclang.so" ] || ls "$path"/libclang.so.* >/dev/null 2>&1; then
                  echo "LIBCLANG_PATH=$path" >> $GITHUB_ENV
                  echo "Found libclang at: $path (manual search)"
                  break
                fi
              done
            fi
          fi

      # ---------- macOS ----------
      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake protobuf snappy lz4 zstd llvm

          # Set up LLVM paths for bindgen on macOS
          LLVM_PREFIX=$(brew --prefix llvm)
          echo "LLVM_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV
          echo "LIBCLANG_PATH=$LLVM_PREFIX/lib" >> $GITHUB_ENV
          echo "DYLD_FALLBACK_LIBRARY_PATH=$LLVM_PREFIX/lib:$DYLD_FALLBACK_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PATH=$LLVM_PREFIX/bin:$PATH" >> $GITHUB_ENV
          echo "Configured LLVM at: $LLVM_PREFIX"

      # ---------- Windows ----------
      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake ninja protoc -y

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust + RocksDB
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rocketmq-rust-${{ matrix.os }}
          workspaces: |
            .
          env-vars: |
            CC
            CXX
            LIBCLANG_PATH
            LLVM_PREFIX
            DYLD_FALLBACK_LIBRARY_PATH
            ROCKSDB_DISABLE_JEMALLOC

      - name: Build (all features)
        run: cargo build --workspace --all-features

      - name: Test (all features)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace --all-features

  # =========================
  # Coverage (Ubuntu only)
  # =========================
  coverage:
    name: Code Coverage
    needs: check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm libclang-dev \
            cmake make ninja-build pkg-config \
            protobuf-compiler \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev \
            libxcb1-dev libxkbcommon-dev libxkbcommon-x11-dev

          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

          # Use llvm-config to find libclang path
          if command -v llvm-config >/dev/null 2>&1; then
            LIBCLANG_PATH=$(llvm-config --libdir)
            echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
            echo "Found libclang using llvm-config at: $LIBCLANG_PATH"
          else
            # Fallback: Search for llvm-config with version suffix
            LLVM_CONFIG=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -n 1)
            if [ -n "$LLVM_CONFIG" ]; then
              LIBCLANG_PATH=$($LLVM_CONFIG --libdir)
              echo "LIBCLANG_PATH=$LIBCLANG_PATH" >> $GITHUB_ENV
              echo "Found libclang using $LLVM_CONFIG at: $LIBCLANG_PATH"
            else
              # Last resort: search manually
              for path in /usr/lib/llvm-*/lib /usr/lib/x86_64-linux-gnu /usr/lib64 /usr/lib; do
                if [ -f "$path/libclang.so" ] || ls "$path"/libclang.so.* >/dev/null 2>&1; then
                  echo "LIBCLANG_PATH=$path" >> $GITHUB_ENV
                  echo "Found libclang at: $path (manual search)"
                  break
                fi
              done
            fi
          fi

      - name: Set up Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Rust + RocksDB
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rocketmq-rust-coverage
          workspaces: |
            .
          env-vars: |
            CC
            CXX
            LIBCLANG_PATH
            LLVM_PREFIX
            DYLD_FALLBACK_LIBRARY_PATH
            ROCKSDB_DISABLE_JEMALLOC

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (all features)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
          verbose: true
