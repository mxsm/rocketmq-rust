<!--
  Ballpit Dynamic Background Include

  Usage:
  Add `ballpit_bg: true` to page header front matter

  Example:
  ---
  header:
    ballpit_bg: true
  ---
-->
{% if page.header.ballpit_bg %}
<div class="ballpit-container">
  <canvas id="ballpit-canvas"></canvas>
  <div class="ballpit-content">
    {% if page.header.overlay_color or page.header.overlay_image or page.header.video.id %}
      {% include ballpit/ballpit-hero-overlay.html %}
    {% endif %}
  </div>
</div>

<script src="{{ '/assets/js/ballpit.js' | relative_url }}"></script>
{% endif %}
