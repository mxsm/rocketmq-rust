{{- include "rocketmq.validateValues" . -}}
{{- $root := . -}}
{{- range $service, $ports := dict "broker" (list 10911 10912) "namesrv" (list 9876) "controller" (list 60109 60110) }}
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-{{ $service }}-headless
  namespace: {{ $root.Release.Namespace }}
  labels:
{{ include "rocketmq.labels" (dict "root" $root "service" $service) | indent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
{{ include "rocketmq.selectorLabels" (dict "root" $root "service" $service) | indent 4 }}
  ports:
{{- range $port := $ports }}
    - name: tcp-{{ $port }}
      port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-{{ $service }}
  namespace: {{ $root.Release.Namespace }}
  labels:
{{ include "rocketmq.labels" (dict "root" $root "service" $service) | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "rocketmq.selectorLabels" (dict "root" $root "service" $service) | indent 4 }}
  ports:
{{- range $port := $ports }}
    - name: tcp-{{ $port }}
      port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
{{- end }}
---
{{- end }}
{{- if eq .Values.deploymentProfile "production-controller-ha" }}
{{- range $ordinal := until (int .Values.services.controller.replicas) }}
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-controller-{{ $ordinal }}
  namespace: {{ $root.Release.Namespace }}
  labels:
{{ include "rocketmq.labels" (dict "root" $root "service" "controller") | indent 4 }}
    rocketmq.apache.org/controller-ordinal: {{ $ordinal | quote }}
spec:
  type: ClusterIP
  clusterIP: {{ index $root.Values.services.controller.peerServiceClusterIPs $ordinal }}
  publishNotReadyAddresses: true
  selector:
    statefulset.kubernetes.io/pod-name: rocketmq-controller-{{ $ordinal }}
  ports:
    - {name: remoting, port: 60109, targetPort: 60109, protocol: TCP}
    - {name: raft, port: 60110, targetPort: 60110, protocol: TCP}
---
{{- end }}
{{- end }}
{{- range $service, $ports := dict "proxy" (list 8080 8081) "mcp" (list 8089) }}
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-{{ $service }}
  namespace: {{ $root.Release.Namespace }}
  labels:
{{ include "rocketmq.labels" (dict "root" $root "service" $service) | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "rocketmq.selectorLabels" (dict "root" $root "service" $service) | indent 4 }}
  ports:
{{- range $port := $ports }}
    - name: tcp-{{ $port }}
      port: {{ $port }}
      targetPort: {{ $port }}
      protocol: TCP
{{- end }}
---
{{- end }}
