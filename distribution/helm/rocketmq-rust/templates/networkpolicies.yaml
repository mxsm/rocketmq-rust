{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-default-deny
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: rocketmq-rust
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rocketmq-rust
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-dns-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rocketmq-rust
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-otel-egress
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: rocketmq-rust
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.observabilityNamespaceLabel }}: "true"
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - {protocol: TCP, port: 4317}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-controller
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      rocketmq.apache.org/service: controller
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: controller
      ports:
        - {protocol: TCP, port: 60110}
    - from:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.clientNamespaceLabel }}: "true"
      ports:
        - {protocol: TCP, port: 60109}
  egress:
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: controller
      ports:
        - {protocol: TCP, port: 60110}
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
      ports:
        - {protocol: TCP, port: 10911}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-broker
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      rocketmq.apache.org/service: broker
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
      ports:
        - {protocol: TCP, port: 10912}
    - from:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: controller
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: proxy
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: mcp
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.clientNamespaceLabel }}: "true"
      ports:
        - {protocol: TCP, port: 10911}
  egress:
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
      ports:
        - {protocol: TCP, port: 10912}
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: namesrv
      ports:
        - {protocol: TCP, port: 9876}
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: controller
      ports:
        - {protocol: TCP, port: 60109}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-namesrv
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      rocketmq.apache.org/service: namesrv
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: proxy
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: mcp
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.clientNamespaceLabel }}: "true"
      ports:
        - {protocol: TCP, port: 9876}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-proxy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      rocketmq.apache.org/service: proxy
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.clientNamespaceLabel }}: "true"
      ports:
        - {protocol: TCP, port: 8080}
        - {protocol: TCP, port: 8081}
  egress:
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: namesrv
      ports:
        - {protocol: TCP, port: 9876}
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
      ports:
        - {protocol: TCP, port: 10911}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rocketmq-mcp
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      rocketmq.apache.org/service: mcp
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.clientNamespaceLabel }}: "true"
      ports:
        - {protocol: TCP, port: 8089}
  egress:
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: namesrv
      ports:
        - {protocol: TCP, port: 9876}
    - to:
        - podSelector:
            matchLabels:
              rocketmq.apache.org/service: broker
      ports:
        - {protocol: TCP, port: 10911}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - {protocol: TCP, port: 443}
{{- end }}
