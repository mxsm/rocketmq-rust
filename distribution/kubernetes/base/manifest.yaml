# Source: rocketmq-rust/templates/configmaps.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-proxy-config
  namespace: rocketmq
  labels:
    app.kubernetes.io/name: rocketmq-proxy
    app.kubernetes.io/instance: rocketmq
    app.kubernetes.io/part-of: rocketmq-rust
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    rocketmq.apache.org/service: proxy
    rocketmq.apache.org/architecture-milestone: M11-09
data:
  proxy.toml: |-
    mode = "cluster"
    enableAclRpcHookForClusterMode = true

    [grpc]
    listenAddr = "0.0.0.0:8081"

    [remoting]
    enabled = true
    listenAddr = "0.0.0.0:8080"

    [cluster]
    namesrvAddr = "rocketmq-namesrv-0.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876;rocketmq-namesrv-1.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876;rocketmq-namesrv-2.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876"

    [auth]
    authenticationEnabled = true
    authorizationEnabled = true
    authConfigPath = "/var/lib/rocketmq/proxy/auth"
    aclFile = "/var/run/secrets/rocketmq/proxy-acl.yml"
    aclFileWatchEnabled = true
---
# Source: rocketmq-rust/templates/configmaps.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: rocketmq-mcp-config
  namespace: rocketmq
  labels:
    app.kubernetes.io/name: rocketmq-mcp
    app.kubernetes.io/instance: rocketmq
    app.kubernetes.io/part-of: rocketmq-rust
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: "0.1.0"
    rocketmq.apache.org/service: mcp
    rocketmq.apache.org/architecture-milestone: M11-09
data:
  mcp.toml: |-
    [server]
    name = "rocketmq-mcp"
    version = "1.0.0"
    transport = "streamable-http"
    log_level = "info"

    [server.stdio]
    log_to_stderr = true

    [server.http]
    bind = "0.0.0.0:8089"
    endpoint = "/mcp"
    public_base_url = "https://mcp.example.invalid"
    validate_origin = true
    allowed_origins = ["https://mcp.example.invalid"]

    [server.http.tls]
    cert_path = "/var/run/secrets/rocketmq/tls.crt"
    key_path = "/var/run/secrets/rocketmq/tls.key"

    [server.http.auth]
    mode = "oauth-jwt"
    development_token_env = "ROCKETMQ_MCP_HTTP_TOKEN_DISABLED"
    issuer = "https://issuer.example.invalid"
    audience = "rocketmq-mcp"
    required_scopes = ["rocketmq:read"]
    jwt_algorithm = "rs256"
    jwt_key_env = ""
    jwks_url = "https://issuer.example.invalid/.well-known/jwks.json"
    jwks_refresh_seconds = 300
    jwks_max_stale_seconds = 900
    protected_resource_metadata_path = "/.well-known/oauth-protected-resource"

    [[clusters]]
    name = "rocketmq-rust"
    namesrv_addr = "rocketmq-namesrv-0.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876;rocketmq-namesrv-1.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876;rocketmq-namesrv-2.rocketmq-namesrv-headless.rocketmq.svc.cluster.local:9876"
    default = true

    [security]
    profile = "diagnose"
    allow_change_planning = false
    sanitize_output = true
    rate_limit_per_minute = 60
    permissions_file = "/etc/rocketmq/permissions.toml"
    max_concurrent_requests_per_cluster = 8

    [audit]
    enabled = true
    sink = "file"
    path = "/var/lib/rocketmq/mcp/audit/rocketmq-mcp-audit.log"
    queue_capacity = 1024
    max_record_bytes = 16384
    queue_max_bytes = 1048576
    history_limit = 100

    [cache]
    enabled = true
    max_entries = 256
    cluster_overview_ttl_ms = 3000
    topic_list_ttl_ms = 5000
    broker_metrics_ttl_ms = 2000
    consumer_lag_ttl_ms = 1000

    [diagnosis]
    consumer_lag_policy_profile = "production-default"
    consumer_lag_threshold = 1000
  permissions.toml: |-
    [roles.read_only]
    allowed_clusters = ["*"]
    allow_tools = [
      "rocketmq_get_cluster_overview",
      "rocketmq_list_topics",
      "rocketmq_describe_topic",
      "rocketmq_get_topic_route",
      "rocketmq_list_consumer_groups",
      "rocketmq_get_consumer_lag",
      "rocketmq_describe_broker"
    ]
    deny_tools = ["*"]

    [roles.diagnose]
    include = ["read_only"]
    allowed_clusters = ["*"]
    allow_tools = [
      "rocketmq_diagnose_consumer_lag"
    ]

