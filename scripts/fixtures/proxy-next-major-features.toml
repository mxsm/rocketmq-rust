schema_version = 1
activation_window = "next-major"

[features]
default = ["compat-all-modes"]
cluster-mode = ["dep:rocketmq-proxy-cluster"]
local-mode = ["dep:rocketmq-proxy-local"]
compat-all-modes = ["cluster-mode", "local-mode"]
tieredstore = ["local-mode", "rocketmq-proxy-local/tieredstore"]

[dependencies.rocketmq-proxy-cluster]
optional = true

[dependencies.rocketmq-proxy-local]
optional = true

[closure.no-default]
required = ["rocketmq-proxy-core"]
forbidden = ["rocketmq-proxy-cluster", "rocketmq-proxy-local", "rocketmq-client-rust", "rocketmq-broker"]

[closure.cluster-mode]
required = ["rocketmq-proxy-core", "rocketmq-proxy-cluster", "rocketmq-client-rust"]
forbidden = ["rocketmq-proxy-local", "rocketmq-broker", "rocketmq-store"]

[closure.local-mode]
required = ["rocketmq-proxy-core", "rocketmq-proxy-local", "rocketmq-broker"]
forbidden = ["rocketmq-proxy-cluster", "rocketmq-client-rust"]

[closure.compat-all-modes]
required = ["rocketmq-proxy-core", "rocketmq-proxy-cluster", "rocketmq-proxy-local"]
forbidden = []

[closure.tieredstore]
required = ["rocketmq-proxy-core", "rocketmq-proxy-local", "rocketmq-tieredstore"]
forbidden = ["rocketmq-proxy-cluster", "rocketmq-client-rust"]
